name: Fetch Setlist Data

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch setlists from setlist.fm
        run: node scripts/fetch-setlists.mjs
        env:
          SETLISTFM_API_KEY: ${{ secrets.SETLISTFM_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/setlists.json
          if git diff --staged --quiet; then
            echo "No changes to setlist data."
          else
            git commit -m "chore: update setlist data [skip ci]"
            git push
          fi
