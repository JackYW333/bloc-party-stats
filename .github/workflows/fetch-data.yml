name: Fetch Setlist Data (Recent)

on:
  schedule:
    # Run daily at 06:00 UTC — fetches recent pages only and merges
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch recent setlists and merge
        run: node scripts/fetch-setlists.mjs --recent
        env:
          SETLISTFM_API_KEY: ${{ secrets.SETLISTFM_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/setlists.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update setlist data (recent) [skip ci]"
            git push
          fi
