name: Full Setlist Sweep

on:
  schedule:
    # Run every Sunday at 03:00 UTC — full fetch of all pages
    # Catches old shows (5+ years) that had setlists filled in retrospectively
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Full sweep — fetch all setlist pages
        run: node scripts/fetch-setlists.mjs
        env:
          SETLISTFM_API_KEY: ${{ secrets.SETLISTFM_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/setlists.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update setlist data (full sweep) [skip ci]"
            git push
          fi
